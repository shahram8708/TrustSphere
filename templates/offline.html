<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0B1F4E">
  <title>You are offline | TrustSphere</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --ts-primary: #0B1F4E;
      --ts-secondary: #006D77;
      --ts-accent: #C9A84C;
      --ts-bg-light: #F5F5F5;
      --ts-text-dark: #1A1A2E;
      --ts-text-muted: #6C757D;
      --ts-border-color: #E0E0E0;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 1rem;
      font-family: Inter, system-ui, sans-serif;
      color: var(--ts-text-dark);
      background:
        linear-gradient(135deg, rgba(11, 31, 78, 0.08), rgba(0, 109, 119, 0.12)),
        var(--ts-bg-light);
    }

    .offline-shell {
      width: min(100%, 720px);
      border: 1px solid var(--ts-border-color);
      border-radius: 8px;
      background: #FFFFFF;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.14);
      overflow: hidden;
    }

    .offline-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem;
      color: #FFFFFF;
      background: var(--ts-primary);
    }

    .offline-header svg {
      width: 56px;
      height: 56px;
      flex: 0 0 auto;
    }

    .offline-body {
      padding: 1.5rem;
    }

    .offline-body a {
      color: var(--ts-secondary);
      font-weight: 600;
    }

    .offline-page-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 0.75rem;
      margin: 1.25rem 0;
      padding: 0;
      list-style: none;
    }

    .offline-page-list a {
      display: block;
      padding: 0.75rem 0.9rem;
      border: 1px solid var(--ts-border-color);
      border-radius: 8px;
      background: #FFFFFF;
      text-decoration: none;
    }

    .offline-page-list a:hover {
      border-color: var(--ts-accent);
      color: var(--ts-primary);
    }

    .btn-trustsphere {
      --bs-btn-bg: var(--ts-accent);
      --bs-btn-border-color: var(--ts-accent);
      --bs-btn-color: var(--ts-primary);
      --bs-btn-hover-bg: #E0BD58;
      --bs-btn-hover-border-color: #E0BD58;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="offline-shell">
    <section class="offline-header">
      <svg viewBox="0 0 64 64" role="img" aria-label="TrustSphere shield">
        <path d="M32 4c12 7 22 8 28 8v19c0 20-12 34-28 43C16 65 4 51 4 31V12c6 0 16-1 28-8z" fill="#C9A84C"/>
        <path d="M32 12c8 4 14 5 20 6v13c0 14-8 24-20 31C20 55 12 45 12 31V18c6-1 12-2 20-6z" fill="#006D77"/>
        <path d="M22 24h20M32 24v24" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
      </svg>
      <div>
        <p class="text-warning fw-semibold mb-1">TrustSphere</p>
        <h1 class="h3 text-white mb-0">You are offline</h1>
      </div>
    </section>
    <section class="offline-body">
      <p class="lead mb-2">TrustSphere requires a connection for live security monitoring.</p>
      <p class="text-muted mb-0">Cached public pages may still be available while your device reconnects.</p>

      <ul class="offline-page-list" aria-label="Cached pages">
        <li><a href="/">Home</a></li>
        <li><a href="/about">About</a></li>
        <li><a href="/features">Features</a></li>
        <li><a href="/compliance">Compliance</a></li>
        <li><a href="/pricing">Pricing</a></li>
        <li><a href="/contact">Contact</a></li>
        <li><a href="/auth/login">Login</a></li>
      </ul>

      <div class="d-flex flex-column flex-sm-row align-items-sm-center justify-content-between gap-3">
        <button class="btn btn-trustsphere" type="button" onclick="location.reload()">Retry connection</button>
        <small class="text-muted">Last checked <span id="offline-updated-at"></span></small>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function () {
      var timestamp = document.getElementById("offline-updated-at");
      if (timestamp) {
        timestamp.textContent = new Date().toLocaleString();
      }
      window.addEventListener("online", function () {
        window.location.reload();
      });
    })();
  </script>
</body>
</html>
